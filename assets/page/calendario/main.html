                                <div class="form-group">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const days = document.querySelectorAll('.day');
            const eventForm = document.getElementById('eventForm');
            const eventDateInput = document.getElementById('eventDate');
            const eventTextInput = document.getElementById('eventText');
            const eventModal = new bootstrap.Modal(document.getElementById('eventModal'));

            const events = JSON.parse(localStorage.getItem('events')) || {};

            function openModal(day) {
                eventDateInput.value = day;
                eventTextInput.value = '';
                eventModal.show();
            }

            function loadEvents() {
                days.forEach(day => {
                    const dayNumber = day.getAttribute('data-day');
                    const dayEvents = events[dayNumber];
                    if (dayEvents) {
                        const eventsDiv = document.createElement('div');
                        eventsDiv.className = 'events';
                        dayEvents.forEach((event, index) => {
                            const eventDiv = document.createElement('div');
                            eventDiv.className = 'event';
                            eventDiv.textContent = event;

                            const removeBtn = document.createElement('button');
                            removeBtn.className = 'btn btn-danger btn-sm ml-2';
                            removeBtn.textContent = 'X';
                            removeBtn.addEventListener('click', () => removeEvent(dayNumber, index));

                            eventDiv.appendChild(removeBtn);
                            eventsDiv.appendChild(eventDiv);
                        });
                        day.appendChild(eventsDiv);
                    }
                });
            }

            function removeEvent(day, index) {
                events[day].splice(index, 1);
                if (events[day].length === 0) {
                    delete events[day];
                }
                localStorage.setItem('events', JSON.stringify(events));
                location.reload();
            }

            eventForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const day = eventDateInput.value;
                const eventText = eventTextInput.value;

                if (!events[day]) {
                    events[day] = [];
                }
                events[day].push(eventText);

                localStorage.setItem('events', JSON.stringify(events));
                location.reload();
            });

            days.forEach(day => {
                day.addEventListener('click', () => openModal(day.getAttribute('data-day')));
            });

            loadEvents();
        });
    </script>
